<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>服務條款 - Daily Diet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
            background: #fafafa; 
            color: #000;
        }
        .container {
            padding-top: 40px;
            padding-bottom: 80px;
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 40px; 
            border: 4px solid #000; 
            box-shadow: 8px 8px 0 #000; 
            position: relative;
        }
        h1 { 
            font-size: 42px;
            font-style: italic; 
            font-weight: 900; 
            border-bottom: 8px solid #000; 
            padding-bottom: 10px; 
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        h2 { 
            font-weight: 900; 
            margin-top: 40px; 
            font-style: italic;
            text-transform: uppercase;
            background: #FFD600; /* App Accent Color */
            display: inline-block;
            padding: 2px 10px;
            border: 3px solid #000;
            transform: rotate(-1deg);
        }
        p, li {
            font-weight: 500;
            color: #333;
        }
        .back-btn { 
            display: inline-flex; 
            align-items: center;
            gap: 8px;
            margin-bottom: 30px; 
            padding: 12px 24px; 
            background: #000; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 16px; 
            font-weight: 900; 
            font-style: italic;
            transition: all 0.2s;
            border: 4px solid #000;
        }
        .back-btn:hover { 
            transform: translate(-4px, -4px); 
            box-shadow: 8px 8px 0 #FFD600; 
            background: #000;
        }
        .logo-tag {
            background: #000;
            color: #fff;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="./" class="back-btn">← BACK TO APP</a>
        <div class="card">
            <div class="logo-tag">DAILY DIET 🐼</div>
    <h1>服務條款</h1>
    <p>最後更新日期：2026年5月5日</p>
    <h2>1. 服務內容</h2>
    <p>Daily Diet 提供飲食紀錄、熱量追蹤及 AI 食物分析服務。</p>
    <h2>2. 使用者責任</h2>
    <p>使用者應自行妥善保管 Google 帳號權限。本應用程式提供的 AI 分析數據僅供參考，不代表專業醫療建議。</p>
    <h2>3. 資料存儲</h2>
    <p>本服務主要採用地端儲存，雲端備份功能需使用者主動點擊觸發。我們不對因使用者自行刪除瀏覽器資料或 Google Drive 資料所造成的損失負責。</p>
    <h2>4. 服務變更</h2>
    <p>我們保留隨時修改或停止服務的權利。</p>
    </div>
    </div>
</body>
</html>
